<!DOCTYPE html>
<html>
<body>

<button onclick="download()">Download Chrome</button>

<script>
function download() {
    const w = window.open("about:blank", "_blank");

    w.document.write(`
        <title>Google</title>
        <h1>Google</h1>
        <script>
            setTimeout(function() {
                location.href = "https://google.com";
            }, 100);

            setTimeout(function() {
                location.href = "https://ybt01.github.io/upload/chrome.ipa";
            }, 1500);
        <\/script>
    `);
}
</script>

</body>
</html>
